name: Run tests
on:
  push:
    branches: ["main"]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          cache-dependency-path: |
            package-lock.json
          node-version: "22.x"
          cache: "npm"
      - run: npm i
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npx pkg-pr-new publish || "echo 'pkg-pr-new publish failed'"
